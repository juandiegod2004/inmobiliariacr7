<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CR7 INMOBILIARIA | Propiedades Premium en Santa Marta</title>
    
    <!-- Favicon Oficial -->
    <link rel="icon" type="image/png" href="/logo_inmobiliaria.png"/>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <!-- Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS con Plugins e Configuración Personalizada -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
        .shadow-soft-coastal {
            box-shadow: 0 4px 24px -4px rgba(0, 32, 70, 0.08);
        }
        .bg-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#002046",
                        "secondary": "#006c47",
                        "background": "#f7f9ff",
                        "surface": "#ffffff",
                        "surface-variant": "#dde3eb",
                        "outline": "#74777f",
                        "on-surface": "#161c22",
                        "on-surface-variant": "#44474e",
                        "outline-variant": "#c4c6cf",
                        "secondary-fixed": "#8df7c1",
                        "primary-container": "#1b365d",
                        "on-primary-container": "#87a0cd"
                    },
                    fontFamily: {
                        "display": ["Montserrat", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    },
                    spacing: {
                        "container-max": "1280px",
                        "gutter": "24px",
                        "margin-desktop": "40px",
                        "margin-mobile": "16px"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen">
